{% extends 'ProyectoDjango/base.html' %}

{% block title %}Servicios{% endblock %}

{% block content %}
    <h1 class="text-center text-4xl font-bold mb-10">SERVICIOS</h1>
    {% for servicio in servicios %}
        <div class="flex flex-col justify-center items-center gap-5 p-10">
            <div>
                <p class="text-4xl font-bold">{{servicio.titulo}}</p>
                <p class="text-2xl">{{servicio.contenido}}</p>
            </div>
            <img  class=" xl:w-250 rounded-2xl" src="{{servicio.imagen.url}}">
        </div>
    {% endfor %}

{% endblock %}
