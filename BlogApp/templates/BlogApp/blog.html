{% extends 'ProyectoDjangoApp/base.html' %}

{% block title %}Blog{% endblock %}

{% block content %}
    <h1 class="text-center text-4xl font-bold mb-10">BLOG</h1>
    <section class="grid grid-cols-1 justify-center gap-6 items-center sm:grid-cols-2 lg:grid-cols-3 ">
        {% for post in posts %}
            <div class="flex flex-col w-full p-5 bg-sky-300 rounded-2xl">
                {% if post.imagen %}
                    <img class="w-full rounded-2xl" src="{{post.imagen.url}}">
                {% else %}
                    <img class="w-full rounded-2xl" src="../media/blog/blog_estandar.png">
                {% endif %}
                <div class="text-center">
                    <p class="font-bold">{{post.titulo}}</p>
                    <p class="text-red-600">{{post.contenido}}</p>
                    <p>{{post.categoria}}</p>
                </div>
            
            </div>
        {% endfor %}
    </section>

{% endblock %}
